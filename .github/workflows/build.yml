name: Build and Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # ── Windows build ────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Download llamafile binary
        run: python download_llamafile.py

      - name: Build with PyInstaller
        run: pyinstaller student_ai.spec

      - name: Create models folder and zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force "dist\StudentAI\models"
          Compress-Archive -Path "dist\StudentAI" -DestinationPath "StudentAI-Windows.zip" -Force

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: StudentAI-Windows.zip
          generate_release_notes: true

  # ── macOS build ──────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Download llamafile binary
        run: python download_llamafile.py

      - name: Build with PyInstaller
        run: pyinstaller student_ai.spec

      - name: Create models folder and zip
        run: |
          mkdir -p "dist/StudentAI.app/Contents/MacOS/models"
          cd dist && zip -r "../StudentAI-macOS.zip" StudentAI.app

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: StudentAI-macOS.zip
