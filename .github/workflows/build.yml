name: Build and Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # ── Windows build ────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.12"

      - name: Install dependencies (SSE2-only build for maximum compatibility)
        shell: pwsh
        run: |
          pip install --upgrade pip setuptools wheel cmake
          pip install customtkinter pynput pyperclip pystray Pillow requests huggingface_hub pyinstaller
          # Compile with SSE2 only — works on every x86-64 CPU ever made,
          # including old school Celerons/Pentiums and end-of-lease laptops
          $env:CMAKE_ARGS = "-DGGML_AVX=off -DGGML_AVX2=off -DGGML_AVX512=off -DGGML_FMA=off -DGGML_F16C=off -DCMAKE_CXX_FLAGS='/arch:SSE2' -DCMAKE_C_FLAGS='/arch:SSE2'"
          pip install llama-cpp-python --no-binary llama-cpp-python

      - name: Build with PyInstaller
        run: pyinstaller student_ai.spec

      - name: Create models folder and zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force "dist\StudentAI\models"
          Compress-Archive -Path "dist\StudentAI" -DestinationPath "StudentAI-Windows.zip" -Force

      - name: Upload to release
        uses: softprops/action-gh-release@v2.3.2
        with:
          files: StudentAI-Windows.zip
          generate_release_notes: true

  # ── macOS build ──────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.12"

      - name: Install dependencies (Metal build of llama-cpp-python)
        run: |
          pip install --upgrade pip
          # Install everything except llama-cpp-python first
          pip install customtkinter pynput pyperclip pystray Pillow requests huggingface_hub pyinstaller
          # Compile llama-cpp-python with Metal GPU support
          CMAKE_ARGS="-DGGML_METAL=on" pip install llama-cpp-python --no-binary llama-cpp-python

      - name: Build with PyInstaller
        run: pyinstaller student_ai.spec

      - name: Create models folder and zip
        run: |
          mkdir -p "dist/StudentAI.app/Contents/MacOS/models"
          cd dist && zip -r "../StudentAI-macOS.zip" StudentAI.app

      - name: Upload to release
        uses: softprops/action-gh-release@v2.3.2
        with:
          files: StudentAI-macOS.zip
